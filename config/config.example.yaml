app:
  database_url: "postgresql+psycopg://${POSTGRES_USER:-server_tg_home}:${POSTGRES_PASSWORD:-server_tg_home_password}@postgres:5432/${POSTGRES_DB:-server_tg_home}"
  redis_url: "redis://redis:6379/0"
  queue_name: "server_tg_home_jobs"
  log_level: "INFO"
  webhook_token: "${STH_WEBHOOK_TOKEN:-}"

api:
  enable_telegram_polling: true

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN:-}"
  proxy_url: "${TELEGRAM_PROXY_URL:-}"
  allowed_chat_ids: []
  default_chat_ids: []
  default_message_thread_id: null
  panels:
    door:
      title: "Входная дверь"
      kind: "door"
      chat_id: null
      message_thread_id: null
      camera_id: "entrance"
      video_duration_sec: 20
    climate:
      title: "Температура и влажность"
      kind: "climate"
      chat_id: null
      message_thread_id: null
      room_id: "all"
  request_timeout_sec: 180

home_assistant:
  base_url: "http://homeassistant.local:8123"
  token: "${HOME_ASSISTANT_TOKEN:-}"
  request_timeout_sec: 20

temperatures:
  default_unit: "°C"
  default_humidity_unit: "%"
  stale_after_sec: 7200
  rooms:
    bedroom:
      title: "Спальня"
    living_room:
      title: "Гостиная"

graphs:
  queue_name: "server_tg_home_graph_jobs"
  path: "/data/graphs"
  default_window: "24h"
  max_window: "30d"
  width: 1200
  height_per_panel: 360
  scale: 2
  history_retention_days: 180
  artifact_retention_days: 14

storage:
  path: "/data/clips"
  max_size_mb: 10240
  warning_threshold_percent: 85
  cleanup_target_percent: 75
  delete_batch_size: 10
  warning_cooldown_sec: 3600
  retention_poll_sec: 300
  notify_chat_ids: []
  notify_message_thread_id: null

buffer:
  enabled: true
  path: "/data/buffer"
  pre_event_seconds: 4
  segment_seconds: 1
  keep_seconds: 60
  restart_delay_sec: 5

cameras:
  entrance:
    rtsp_url: "rtsp://user:password@192.168.1.10:554/stream1"
    buffer_enabled: true
    default_duration_sec: 20
    ffmpeg_input_args:
      - "-rtsp_transport"
      - "tcp"
    ffmpeg_output_args:
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:a?"
      - "-c:v"
      - "copy"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "128k"
    ffmpeg_clip_output_args:
      - "-map"
      - "0:v:0"
      - "-map"
      - "0:a?"
      - "-c:v"
      - "libx264"
      - "-preset"
      - "veryfast"
      - "-crf"
      - "23"
      - "-pix_fmt"
      - "yuv420p"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "128k"
      - "-movflags"
      - "+faststart"

events:
  door_open:
    camera_id: "entrance"
    duration_sec: 20
    pre_event_sec: 4
    cooldown_sec: 30
    dedupe_window_sec: 5
    chat_ids: []
    message_thread_id: null
    message: "Door opened"
