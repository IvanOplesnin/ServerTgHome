services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-server_tg_home}
      POSTGRES_USER: ${POSTGRES_USER:-server_tg_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-server_tg_home_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  go2rtc:
    image: alexxit/go2rtc:1.9.14
    restart: unless-stopped
    volumes:
      - ./config:/config:ro
      - ./data:/data:ro
    ports:
      - "127.0.0.1:1984:1984"

  api:
    build: .
    restart: unless-stopped
    command: ["server-tg-home", "api", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      STH_CONFIG: /app/config/config.yaml
      POSTGRES_DB: ${POSTGRES_DB:-server_tg_home}
      POSTGRES_USER: ${POSTGRES_USER:-server_tg_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-server_tg_home_password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      STH_WEBHOOK_TOKEN: ${STH_WEBHOOK_TOKEN:-}
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    restart: unless-stopped
    command: ["server-tg-home", "worker"]
    environment:
      STH_CONFIG: /app/config/config.yaml
      POSTGRES_DB: ${POSTGRES_DB:-server_tg_home}
      POSTGRES_USER: ${POSTGRES_USER:-server_tg_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-server_tg_home_password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  graph-worker:
    build: .
    restart: unless-stopped
    command: ["server-tg-home", "graph-worker"]
    environment:
      STH_CONFIG: /app/config/config.yaml
      POSTGRES_DB: ${POSTGRES_DB:-server_tg_home}
      POSTGRES_USER: ${POSTGRES_USER:-server_tg_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-server_tg_home_password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  audio-worker:
    build: .
    restart: unless-stopped
    command: ["server-tg-home", "audio-worker"]
    environment:
      STH_CONFIG: /app/config/config.yaml
      POSTGRES_DB: ${POSTGRES_DB:-server_tg_home}
      POSTGRES_USER: ${POSTGRES_USER:-server_tg_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-server_tg_home_password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      go2rtc:
        condition: service_started

  buffer:
    build: .
    restart: unless-stopped
    command: ["server-tg-home", "buffer"]
    environment:
      STH_CONFIG: /app/config/config.yaml
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
    depends_on:
      - redis

  retention:
    build: .
    restart: unless-stopped
    command: ["server-tg-home", "retention"]
    environment:
      STH_CONFIG: /app/config/config.yaml
      POSTGRES_DB: ${POSTGRES_DB:-server_tg_home}
      POSTGRES_USER: ${POSTGRES_USER:-server_tg_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-server_tg_home_password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
